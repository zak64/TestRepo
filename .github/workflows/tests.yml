name: Python Unit Tests

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize] # Added types for better PR tracking
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # This job runs for both Pushes and PRs
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest

  # This job ONLY runs if the event is a Pull Request
  check-youtrack-id:
    if: github.event_name == 'pull_request'
    name: "Check YouTrack ID"
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title for DEV-XXX
        shell: bash
        run: |
          # Get the PR Title from the GitHub context
          TITLE="${{ github.event.pull_request.title }}"
          
          echo "Checking PR Title: $TITLE"
          
          # Regex: Starts with 'DEV-' followed by one or more digits
          if [[ ! $TITLE =~ ^DEV-[0-9]+ ]]; then
            echo "-------------------------------------------------------"
            echo "❌ ERROR: Invalid PR Title format."
            echo "Your title must start with a YouTrack ID (e.g., 'DEV-1110 : Add function')."
            echo "Current title: '$TITLE'"
            echo "-------------------------------------------------------"
            exit 1
          else
            echo "✅ Success: PR title contains a valid YouTrack ID."
          fi
