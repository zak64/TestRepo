name: Python Unit Tests

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize] # Added types for better PR tracking
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # This job runs for both Pushes and PRs
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest

  # This job ONLY runs if the event is a Pull Request
  check-youtrack-id:
    if: github.event_name == 'pull_request'
    name: "Check YouTrack ID"
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        shell: bash
        run: |
          TITLE="${{ github.event.pull_request.title }}"

          echo "Verifying PR Title: $TITLE"

          # Required format: DEV-<digits> : <title_or_description>
          if [[ ! $TITLE =~ ^DEV-[0-9]+\ :\ .+ ]]; then
            echo "--------------------------------------------------------"
            echo "❌ ERROR: PR Title format is invalid."
            echo "Expected: 'DEV-12345 : Your title or description'"
            echo "Received: '$TITLE'"
            echo "--------------------------------------------------------"
            exit 1
          else
            echo "✅ Success: PR Title format is valid."
          fi
