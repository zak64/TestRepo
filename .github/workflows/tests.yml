name: Python Unit Tests

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize] # Added types for better PR tracking
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # This job runs for both Pushes and PRs
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest

  # This job ONLY runs if the event is a Pull Request
  check-youtrack-id:
    if: github.event_name == 'pull_request'
    name: "Check YouTrack ID"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 1. We define a custom pattern that looks specifically for DEV-XXX
          # The regex below looks for DEV- followed by digits at the start of the title
          subjectPattern: ^DEV-\d+
          
          # 2. This tells the action "I don't care about feat/fix/chore prefixes"
          # We provide a dummy pattern that matches everything to bypass the 'type' check
          headerPattern: '^(.*)$'
          
          # 3. This ensures the error message actually tells your team what to do
          subjectPatternError: "❌ PR title must start with your YouTrack ID (e.g., 'DEV-1110: My description')."
