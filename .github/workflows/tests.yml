name: Python Unit Tests

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize] # Added types for better PR tracking
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # This job runs for both Pushes and PRs
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest

  # This job ONLY runs if the event is a Pull Request
  check-youtrack-id:
    if: github.event_name == 'pull_request'
    name: "Check YouTrack ID"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR Title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 1. We redefine the header to say: "The whole line is just one big group"
          # This stops the action from looking for 'feat:' or 'fix:'
          headerPattern: '^(.+)$'
          
          # 2. We tell it that the first group in our pattern above is the "subject"
          headerPatternCorrespondence: subject
          
          # 3. Now we check that "subject" (the whole title) for your YouTrack ID
          subjectPattern: ^DEV-\d+
          subjectPatternError: "❌ PR title must start with your YouTrack ID (e.g., 'DEV-1110 : Add function')."
