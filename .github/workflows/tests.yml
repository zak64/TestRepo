name: Python Unit Tests

on:
  pull_request:
    branches: [ main ]
    types: [opened, edited, synchronize] # Added types for better PR tracking
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # This job runs for both Pushes and PRs
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: pytest

  # This job ONLY runs if the event is a Pull Request
  check-youtrack-id:
    if: github.event_name == 'pull_request'
    name: "Check YouTrack ID"
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Title
        shell: bash
        run: |
          # Get the PR Title from the GitHub Event context
          TITLE="${{ github.event.pull_request.title }}"
          
          echo "Verifying PR Title: $TITLE"
          
          # Regex explanation:
          # ^      : Start of the string
          # DEV-   : Literal text
          # [0-9]+ : One or more digits
          if [[ ! $TITLE =~ ^DEV-[0-9]+ ]]; then
            echo "--------------------------------------------------------"
            echo "❌ ERROR: PR Title must start with a YouTrack ID."
            echo "Expected: 'DEV-1110 : Your description'"
            echo "Received: '$TITLE'"
            echo "--------------------------------------------------------"
            exit 1
          else
            echo "✅ Success: PR Title is valid."
          fi
